name: 🧪 CI

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'refactor/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'refactor/**'
      - 'hotfix/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest    

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.10.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Ensure pnpm is on PATH (fallback)
        run: npm i -g pnpm@8 || true

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Lint
        env:
          # Explicitly skip strict env validation during lint to avoid failures when secrets
          # are not available (fork PRs, etc.). The application also auto-detects lint/test
          # contexts, but setting this makes intent explicit for CI runs.
          SKIP_ENV_VALIDATION: 'true'
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

      - name:  Run Format check
        run: pnpm run format:check
