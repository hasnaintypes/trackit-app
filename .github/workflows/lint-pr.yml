name: 🧹 Lint PRs

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch_name=${{ github.head_ref }}
          if [[ ! $branch_name =~ ^(feat|fix|chore|docs|refactor|test|hotfix|release)/[a-z0-9._-]+$ ]]; then
            echo "❌ Invalid branch name: $branch_name"
            echo "Follow pattern: <type>/<short-description>"
            exit 1
          fi
