<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Digest</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
        &quot;Helvetica Neue&quot;, Arial, sans-serif;
      background-color: #f4f4f5;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f4f5; padding: 40px 20px"
    >
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            "
          >
            <tr>
              <td
                style="
                  background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
                  padding: 30px;
                  text-align: center;
                "
              >
                <h1
                  style="
                    margin: 0;
                    color: #ffffff;
                    font-size: 24px;
                    font-weight: 600;
                  "
                >
                  📅 Weekly Digest
                </h1>
                <p style="margin: 10px 0 0; color: #ede9fe; font-size: 14px">
                  {{weekRange}}
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding: 40px 30px">
                <p
                  style="
                    margin: 0 0 30px;
                    font-size: 16px;
                    line-height: 1.6;
                    color: #18181b;
                  "
                >
                  Hi {{userName}},<br />
                  Here's your weekly spending summary.
                </p>

                <table
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  style="
                    background-color: #f0f9ff;
                    border-radius: 6px;
                    padding: 20px;
                    margin-bottom: 30px;
                  "
                >
                  <tr>
                    <td
                      style="
                        font-size: 14px;
                        color: #71717a;
                        padding-bottom: 8px;
                      "
                    >
                      Total Spent This Week
                    </td>
                    <td
                      style="
                        font-size: 24px;
                        font-weight: 600;
                        text-align: right;
                        color: #18181b;
                      "
                    >
                      ${{weeklyTotal}}
                    </td>
                  </tr>
                  <tr>
                    <td
                      colspan="2"
                      style="padding-top: 10px; font-size: 12px; color: #71717a"
                    >
                      {{changeText}} from last week
                    </td>
                  </tr>
                </table>

                <h2
                  style="
                    margin: 0 0 20px;
                    font-size: 18px;
                    font-weight: 600;
                    color: #18181b;
                  "
                >
                  This Week's Activity
                </h2>
                <table
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  style="margin-bottom: 30px"
                >
                  <tr>
                    <td
                      style="padding: 12px 0; border-bottom: 1px solid #e4e4e7"
                    >
                      <span style="font-size: 14px; color: #71717a"
                        >Transactions</span
                      >
                    </td>
                    <td
                      style="
                        padding: 12px 0;
                        border-bottom: 1px solid #e4e4e7;
                        text-align: right;
                      "
                    >
                      <span
                        style="
                          font-size: 14px;
                          font-weight: 500;
                          color: #18181b;
                        "
                        >{{transactionCount}}</span
                      >
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="padding: 12px 0; border-bottom: 1px solid #e4e4e7"
                    >
                      <span style="font-size: 14px; color: #71717a"
                        >Top Category</span
                      >
                    </td>
                    <td
                      style="
                        padding: 12px 0;
                        border-bottom: 1px solid #e4e4e7;
                        text-align: right;
                      "
                    >
                      <span
                        style="
                          font-size: 14px;
                          font-weight: 500;
                          color: #18181b;
                        "
                        >{{topCategory}}</span
                      >
                    </td>
                  </tr>
                </table>

                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center" style="padding: 20px 0">
                      <a
                        href="{{appUrl}}/transactions"
                        style="
                          display: inline-block;
                          background-color: #8b5cf6;
                          color: #ffffff;
                          text-decoration: none;
                          padding: 12px 30px;
                          border-radius: 6px;
                          font-size: 14px;
                          font-weight: 500;
                        "
                        >View All Transactions</a
                      >
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td
                style="
                  background-color: #f4f4f5;
                  padding: 20px 30px;
                  text-align: center;
                  border-top: 1px solid #e4e4e7;
                "
              >
                <p style="margin: 0; font-size: 12px; color: #71717a">
                  <a
                    href="{{appUrl}}/settings"
                    style="color: #18181b; text-decoration: underline"
                    >Manage notification preferences</a
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
